    // ── Configuración Google Sheets ──────────────────────────
    // Pega aquí la URL de tu Google Apps Script después de implementarlo
    window.SHEETS_URL = "https://script.google.com/macros/s/AKfycbyfXy4yEj9aiMEsgnrncJdgjMfGDAIQY0GmzXFu7HkQm_KVY4iFEmux3pJmtwErQNmINw/exec";

    // ── Storage con Google Sheets + localStorage como respaldo ──
    window.storage = {
      get: async function(key) {
        const val = localStorage.getItem(key);
        return val ? { value: val } : null;
      },
      set: async function(key, value) {
        localStorage.setItem(key, value);
        return { key, value };
      },
      delete: async function(key) {
        localStorage.removeItem(key);
        return { key, deleted: true };
      },
      list: async function(prefix) {
        const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix || ""));
        return { keys };
      }
    };

    // ── Enviar a Google Sheets al guardar ────────────────────
    window.enviarASheets = async function(member, responses) {
      if (!window.SHEETS_URL || window.SHEETS_URL === "PEGA_TU_URL_AQUI") return;
      try {
        await fetch(window.SHEETS_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            timestamp: new Date().toISOString(),
            nombre: member.name,
            negocio: member.business,
            valor: member.valor,
            respuesta_1: responses.q0 || "",
            respuesta_2: responses.q1 || "",
            respuesta_3: responses.q2 || "",
            plan_contenido: responses.reto || "",
            tipo_contenido: responses.contenidoTipo || "",
            link_contenido: responses.contenidoUrl || "",
          })
        });
      } catch(e) {
        console.log("Sheets no disponible, guardado localmente");
      }
    };

const SCREENS = { SELECT: "select", HOMEWORK: "homework", ADMIN: "admin" };

async function loadResponses(memberId) {
  try {
    const result = await window.storage.get(`clase2:${memberId}`);
    if (!result || !result.value || result.value === "") return null;
    const parsed = JSON.parse(result.value);
    if (!parsed || Object.keys(parsed).length === 0) return null;
    return parsed;
  } catch { return null; }
}

async function saveResponses(memberId, data) {
  try {
    await window.storage.set(`clase2:${memberId}`, JSON.stringify(data));
    return true;
  } catch { return false; }
}

async function loadAllResponses() {
  const all = {};
  for (const m of MEMBERS) {
    const r = await loadResponses(m.id);
    if (r) all[m.id] = r;
  }
  return all;
}

  );
}

function AdminScreen() {
  const [allData, setAllData] = useState({});
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState(null);
  const [copied, setCopied] = useState(false);
  const [showReset, setShowReset] = useState(false);

  useEffect(() => {
    loadAllResponses().then(data => { setAllData(data); setLoading(false); });
  }, []);

  const generateCSV = useCallback(() => {
    const headers = ["Nombre", "Negocio", "Valor", "Pregunta 1", "Pregunta 2", "Pregunta 3", "Plan de Contenido", "Tipo de Contenido", "Link Publicado"];
    const esc = v => '"' + (v || "").replace(/"/g, '""').replace(/
/g, " ") + '"';
    const rows = MEMBERS.filter(m => allData[m.id]).map(m => {
      const d = allData[m.id];
      return [m.name, m.business, m.valor, d.q0, d.q1, d.q2, d.reto, d.contenidoTipo, d.contenidoUrl].map(esc).join(",");
    });
    return headers.join(",") + "
" + rows.join("
");
  }, [allData]);

  const handleCopyCSV = () => {
    const csv = generateCSV();
    navigator.clipboard.writeText(csv).then(() => { setCopied(true); setTimeout(() => setCopied(false), 3000); })
      .catch(() => {
        const ta = document.createElement("textarea");
        ta.value = csv; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
        setCopied(true); setTimeout(() => setCopied(false), 3000);
      });
  };

  const handleDownloadCSV = () => {
    const csv = "\uFEFF" + generateCSV();
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "Respuestas_Clase2_Mensaje_Marca.csv"; a.click();
    URL.revokeObjectURL(url);
  };

  const handleResetAll = async () => {
    for (const m of MEMBERS) {
      try { await window.storage.set(`clase2:${m.id}`, ""); } catch {}
      try { await window.storage.delete(`clase2:${m.id}`); } catch {}
    }
    setAllData({}); setShowReset(false);
  };

  if (loading) return <div style={{ textAlign: "center", padding: 40, color: BRAND.mutedText }}>Cargando respuestas...</div>;

  const completedCount = Object.keys(allData).length;
  const conContenido = Object.values(allData).filter(d => d.contenidoTipo).length;

  return (
    <div style={{ maxWidth: 640, margin: "0 auto", padding: "20px 16px" }}>
      <div style={{ textAlign: "center", marginBottom: 20 }}>
        <h1 style={{ fontSize: 20, color: BRAND.navy, margin: "0 0 4px" }}>Panel — Clase 2</h1>
        <p style={{ fontSize: 14, color: BRAND.mutedText, margin: "0 0 12px" }}>{completedCount} de {MEMBERS.length} han respondido · {conContenido} publicaron contenido</p>
        <div style={{ height: 6, background: "#E5E7EB", borderRadius: 3, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${(completedCount / MEMBERS.length) * 100}%`, background: BRAND.olive, borderRadius: 3, transition: "width 0.5s" }} />
        </div>
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
        <button onClick={handleDownloadCSV} style={{ flex: 1, padding: "12px 16px", borderRadius: 10, border: "none", background: BRAND.navy, color: BRAND.white, fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
          📥 Descargar CSV
        </button>
        <button onClick={handleCopyCSV} style={{ flex: 1, padding: "12px 16px", borderRadius: 10, border: "none", background: copied ? BRAND.olive : BRAND.orange, color: BRAND.white, fontWeight: 600, fontSize: 13, cursor: "pointer", transition: "background 0.3s" }}>
          {copied ? "✓ ¡Copiado!" : "📋 Copiar para Sheets"}
        </button>
      </div>

      {MEMBERS.map(m => {
        const data = allData[m.id];
        const isExpanded = expanded === m.id;
        return (
          <div key={m.id} style={{ marginBottom: 10, borderRadius: 12, overflow: "hidden", border: `1px solid ${data ? BRAND.olive + "60" : "#E5E7EB"}` }}>
            <button onClick={() => setExpanded(isExpanded ? null : m.id)} style={{
              width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center",
              background: data ? `${BRAND.olive}10` : BRAND.white, border: "none", padding: "14px 18px", cursor: "pointer", textAlign: "left",
            }}>
              <div>
                <span style={{ fontWeight: 700, fontSize: 15, color: BRAND.navy }}>{m.name}</span>
                <span style={{ fontSize: 12, color: BRAND.mutedText, marginLeft: 8 }}>{m.valor}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {data
                  ? <span style={{ fontSize: 11, color: BRAND.olive, fontWeight: 600, background: `${BRAND.olive}20`, padding: "3px 8px", borderRadius: 6 }}>✓ Completada</span>
                  : <span style={{ fontSize: 11, color: BRAND.mutedText, background: "#F3F4F6", padding: "3px 8px", borderRadius: 6 }}>Pendiente</span>
                }
                {data?.contenidoTipo && (
                  <span style={{ fontSize: 11, color: BRAND.orange, fontWeight: 600, background: `${BRAND.orange}15`, padding: "3px 8px", borderRadius: 6 }}>{data.contenidoTipo}</span>
                )}
                <span style={{ fontSize: 14, color: BRAND.mutedText, transform: isExpanded ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>▼</span>
              </div>
            </button>
            {isExpanded && data && (
              <div style={{ padding: "16px 18px", background: BRAND.white, borderTop: "1px solid #F0F0F0" }}>
                {m.questions.map((q, i) => (
                  <div key={i} style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 12, color: BRAND.orange, fontWeight: 600, marginBottom: 4 }}>Pregunta {i + 1}</div>
                    <div style={{ fontSize: 12, color: BRAND.mutedText, marginBottom: 4 }}>{q}</div>
                    <div style={{ fontSize: 14, color: BRAND.darkText, background: BRAND.lightBg, padding: "10px 12px", borderRadius: 8, lineHeight: 1.6 }}>
                      {data[`q${i}`] || <em style={{ color: "#CCC" }}>Sin respuesta</em>}
                    </div>
                  </div>
                ))}
                {data.reto && (
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 12, color: BRAND.olive, fontWeight: 600, marginBottom: 4 }}>Plan de Contenido</div>
                    <div style={{ fontSize: 14, color: BRAND.darkText, background: `${BRAND.olive}10`, padding: "10px 12px", borderRadius: 8, lineHeight: 1.6 }}>{data.reto}</div>
                  </div>
                )}
                {(data.contenidoTipo || data.contenidoUrl) && (
                  <div style={{ background: BRAND.cream, padding: "12px 14px", borderRadius: 10, marginTop: 8 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: BRAND.navy, marginBottom: 6 }}>Contenido Publicado</div>
                    {data.contenidoTipo && <div style={{ fontSize: 13, color: BRAND.darkText, marginBottom: 4 }}><strong>Formato:</strong> {data.contenidoTipo}</div>}
                    {data.contenidoUrl && (
                      <div style={{ fontSize: 13 }}>
                        <strong style={{ color: BRAND.darkText }}>Link: </strong>
                        <a href={data.contenidoUrl} target="_blank" rel="noreferrer" style={{ color: BRAND.orange }}>{data.contenidoUrl}</a>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
            {isExpanded && !data && (
              <div style={{ padding: "20px", background: BRAND.white, textAlign: "center", borderTop: "1px solid #F0F0F0" }}>
                <p style={{ fontSize: 14, color: BRAND.mutedText, margin: 0 }}>Aún no ha enviado respuestas</p>
              </div>
            )}
          </div>
        );
      })}

      <div style={{ marginTop: 24, textAlign: "center" }}>
        {!showReset ? (
          <button onClick={() => setShowReset(true)} style={{ padding: "10px 20px", borderRadius: 8, border: "1px solid #E5E7EB", background: BRAND.white, color: "#EF4444", fontSize: 12, cursor: "pointer" }}>
            🗑 Limpiar todas las respuestas
          </button>
        ) : (
          <div style={{ background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 10, padding: 16 }}>
            <p style={{ fontSize: 13, color: "#DC2626", fontWeight: 600, margin: "0 0 12px" }}>¿Estás segura? Esto borrará TODAS las respuestas de la Clase 2.</p>
            <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
              <button onClick={handleResetAll} style={{ padding: "10px 24px", borderRadius: 8, border: "none", background: "#DC2626", color: BRAND.white, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Sí, borrar todo</button>
              <button onClick={() => setShowReset(false)} style={{ padding: "10px 24px", borderRadius: 8, border: "1px solid #E5E7EB", background: BRAND.white, color: BRAND.mutedText, fontSize: 13, cursor: "pointer" }}>Cancelar</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState(SCREENS.SELECT);
  const [selectedMember, setSelectedMember] = useState(null);
  const [completedIds, setCompletedIds] = useState(new Set());

  useEffect(() => {
    loadAllResponses().then(data => setCompletedIds(new Set(Object.keys(data))));
  }, []);

  const handleSelect = member => { setSelectedMember(member); setScreen(SCREENS.HOMEWORK); };
  const handleBack = () => {
    setScreen(SCREENS.SELECT); setSelectedMember(null);
    loadAllResponses().then(data => setCompletedIds(new Set(Object.keys(data))));
  };

  return (
    <div style={{ minHeight: "100vh", background: BRAND.lightBg, fontFamily: "'Nunito Sans', 'Segoe UI', sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
      <Header screen={screen} onBack={handleBack} onAdmin={() => setScreen(SCREENS.ADMIN)} />
      {screen === SCREENS.SELECT && <SelectScreen onSelect={handleSelect} completedIds={completedIds} />}
      {screen === SCREENS.HOMEWORK && selectedMember && <HomeworkScreen member={selectedMember} />}
      {screen === SCREENS.ADMIN && <AdminScreen />}
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
